<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Tracker</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0f0f0f;
  color:white;
}

/* TOP */
.top {
  padding:20px;
  text-align:center;
}

.calories {
  font-size:40px;
  font-weight:700;
}

.sub {
  color:gray;
}

/* MEALS */
.container {
  padding:15px;
}

.meal {
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.meal h3 {
  margin:0;
  display:flex;
  justify-content:space-between;
}

.food {
  margin-top:10px;
  padding:8px;
  background:#2a2a2a;
  border-radius:8px;
}

/* BUTTON */
.addBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ff88;
  color:black;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MODAL */
.modal {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#1c1c1c;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}

.modal.show {
  bottom:0;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.suggestion {
  background:#2a2a2a;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="top">
  <div class="calories" id="calories">0</div>
  <div class="sub">Calories</div>
</div>

<div class="container" id="meals"></div>

<div class="addBtn" onclick="openModal()">+</div>

<div class="modal" id="modal">
  <h3>Add Food</h3>
  <input id="search" placeholder="egg, rice, chicken">
  <div id="results"></div>
  <input id="qty" type="number" placeholder="Quantity">
  <select id="meal">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
    <option>Snacks</option>
  </select>
  <button onclick="addFood()">Add</button>
</div>

<script>
let meals = JSON.parse(localStorage.getItem("meals")) || [];

const db = [
  {name:"Egg", cal:70},
  {name:"Rice (1 cup)", cal:200},
  {name:"Chicken Breast (100g)", cal:165},
  {name:"Apple", cal:95}
];

const mealsDiv = document.getElementById("meals");
const caloriesDiv = document.getElementById("calories");

function render(){
  mealsDiv.innerHTML="";
  let total=0;

  ["Breakfast","Lunch","Dinner","Snacks"].forEach(meal=>{
    const div=document.createElement("div");
    div.className="meal";

    let foods = meals.filter(f=>f.meal===meal);

    div.innerHTML = `<h3>${meal}</h3>`;

    foods.forEach(f=>{
      total+=f.cal;
      const food=document.createElement("div");
      food.className="food";
      food.innerText=`${f.name} - ${f.cal} cal`;
      div.appendChild(food);
    });

    mealsDiv.appendChild(div);
  });

  caloriesDiv.innerText = total;
}

function openModal(){
  document.getElementById("modal").classList.add("show");
}

const search = document.getElementById("search");
const results = document.getElementById("results");

search.addEventListener("input", ()=>{
  const val = search.value.toLowerCase();
  results.innerHTML="";

  db.filter(f=>f.name.toLowerCase().includes(val)).forEach(f=>{
    const div=document.createElement("div");
    div.className="suggestion";
    div.innerText=f.name;
    div.onclick=()=> selectFood(f);
    results.appendChild(div);
  });
});

let selected=null;

function selectFood(f){
  selected=f;
  search.value=f.name;
  results.innerHTML="";
}

function addFood(){
  const qty = Number(document.getElementById("qty").value)||1;
  const meal = document.getElementById("meal").value;

  meals.push({
    name:selected.name,
    meal,
    cal:selected.cal * qty
  });

  localStorage.setItem("meals", JSON.stringify(meals));

  document.getElementById("modal").classList.remove("show");
  render();
}

render();
</script>

</body>
</html>
