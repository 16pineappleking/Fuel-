<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Tracker</title>
<style>
  body { font-family:sans-serif; background:#111; color:#fff; padding:20px; max-width:400px; margin:auto; }
  input, select, button { padding:6px; margin:4px 0; width:100%; border-radius:6px; border:none; }
  .entry { padding:8px; border:1px solid #555; border-radius:8px; margin:6px 0; }
  .totals { margin:10px 0; padding:10px; border:1px solid #888; border-radius:8px; }
</style>
</head>
<body>

<h1>Macro Tracker</h1>

<div class="totals">
  <p id="calories">Calories: 0</p>
  <p id="protein">Protein: 0g</p>
  <p id="carbs">Carbs: 0g</p>
  <p id="fat">Fat: 0g</p>
</div>

<h3>Add Food</h3>
<input type="text" id="food-name" placeholder="Food name">
<input type="number" id="food-calories" placeholder="Calories">
<input type="number" id="food-protein" placeholder="Protein g">
<input type="number" id="food-carbs" placeholder="Carbs g">
<input type="number" id="food-fat" placeholder="Fat g">

<div style="display:flex; gap:4px;">
  <input type="number" id="food-qty" placeholder="Qty" value="1" style="flex:1;">
  <select id="food-unit" style="flex:2;">
    <option value="g">g</option>
    <option value="oz">oz</option>
    <option value="cup">cup</option>
    <option value="1/4 cup">1/4 cup</option>
    <option value="1/3 cup">1/3 cup</option>
    <option value="1/2 cup">1/2 cup</option>
    <option value="tbsp">tbsp</option>
    <option value="tsp">tsp</option>
    <option value="piece">piece</option>
  </select>
</div>

<button onclick="addFood()">Add to Log</button>
<button onclick="clearLog()">Clear Log</button>

<h3>Log</h3>
<div id="log"></div>

<script>
let entries = [];

function updateTotals() {
  const totals = entries.reduce((a, e) => ({
    calories: a.calories + e.calories,
    protein: a.protein + e.protein,
    carbs: a.carbs + e.carbs,
    fat: a.fat + e.fat,
  }), { calories:0, protein:0, carbs:0, fat:0 });

  document.getElementById('calories').innerText = "Calories: "+totals.calories;
  document.getElementById('protein').innerText = "Protein: "+totals.protein+"g";
  document.getElementById('carbs').innerText = "Carbs: "+totals.carbs+"g";
  document.getElementById('fat').innerText = "Fat: "+totals.fat+"g";
}

function renderLog() {
  const log = document.getElementById('log');
  log.innerHTML = '';
  entries.forEach((e, i)=>{
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerText = `${e.name} (${e.qty} ${e.unit}) - ${e.calories} kcal | P${e.protein} C${e.carbs} F${e.fat}`;
    log.appendChild(div);
  });
}

function addFood() {
  const name = document.getElementById('food-name').value;
  const calories = Number(document.getElementById('food-calories').value);
  const protein = Number(document.getElementById('food-protein').value);
  const carbs = Number(document.getElementById('food-carbs').value);
  const fat = Number(document.getElementById('food-fat').value);
  const qty = document.getElementById('food-qty').value;
  const unit = document.getElementById('food-unit').value;

  if(!name || !calories) return;

  entries.push({ name, calories, protein, carbs, fat, qty, unit });
  updateTotals();
  renderLog();

  // clear inputs
  document.getElementById('food-name').value='';
  document.getElementById('food-calories').value='';
  document.getElementById('food-protein').value='';
  document.getElementById('food-carbs').value='';
  document.getElementById('food-fat').value='';
}

function clearLog() {
  entries = [];
  updateTotals();
  renderLog();
}

</script>
</body>
</html>
